name: Validate package.json

on:
  push:
    branches:
      - main
      - work
      - 'codex/**'
  pull_request:

jobs:
  validate-package-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate package.json syntax
        run: node scripts/validate-package-json.mjs
